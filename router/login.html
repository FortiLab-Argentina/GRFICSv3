<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login – Fortiphyd Logic</title>
  <link rel="icon" href="{{ url_for('static', filename='D_lock.png') }}">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='fortiphyd.css') }}">
</head>
<body class="bg-light">
  <div class="container py-5">
    <div class="row justify-content-center">
      <div class="col-md-5 col-lg-4">
        <img src="{{ url_for('static', filename='logo_transparent_back.png') }}"
             alt="Fortiphyd Logic" class="fl-login-logo">
        <div class="card shadow-sm fl-login-card">
          <div class="card-body">
            {% with messages = get_flashed_messages(with_categories=true) %}
              {% if messages %}
                {% for cat, msg in messages %}
                  <div class="alert alert-{{ cat }} small" role="alert">{{ msg }}</div>
                {% endfor %}
              {% endif %}
            {% endwith %}
            <form method="POST" action="{{ url_for('login', next=next) }}">
              <div class="mb-3">
                <label class="form-label">Username</label>
                <input name="username" class="form-control" autofocus>
              </div>
              <div class="mb-3">
                <label class="form-label">Password</label>
                <input name="password" type="password" class="form-control">
              </div>
              <div class="d-grid">
                <button class="btn btn-primary">Sign in</button>
              </div>
            </form>
          </div>
        </div>
        <p class="text-muted small mt-3 text-center">Default creds: <code>admin / password</code> (change via config)</p>
      </div>
    </div>
  </div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
