# Do not use /etc/hosts or /etc/resolv.conf — all config is managed via the UI
no-hosts
no-resolv

# Upstream DNS forwarders
server=8.8.8.8
server=8.8.4.4

# Local host entries managed via web UI (reloaded on SIGHUP)
addn-hosts=/etc/firewall/dns_hosts

# Blocked domains managed via web UI (requires dnsmasq restart to take effect)
conf-file=/etc/firewall/dns_blocked.conf

# Query logging
log-queries
log-facility=/var/log/dnsmasq/dnsmasq.log

# DNS cache
cache-size=1000

# Don't forward single-label names (e.g. "plc" with no domain) upstream
domain-needed

# Don't forward reverse lookups for RFC1918 addresses upstream
bogus-priv

# Run as root inside the container
user=root
