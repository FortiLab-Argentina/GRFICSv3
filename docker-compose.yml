# NOTE networks had to be prepended with letters to ensure 
# proper alphabetical order 

services:
  simulation:
    # image: fortiphyd/grfics-simulation
    image: ghcr.io/fortilab-argentina/grfics-simulation:latest
    container_name: simulation
    hostname: simulation
    # build:
    #   context: ./simulation
    #   args:
    #     BUILD_VERSION: ${BUILD_VERSION:-unknown}
    #     BUILD_CREATED: ${BUILD_CREATED:-unknown}
    cap_add:
      - NET_ADMIN
    ports:
      - "80:80"
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "55555"]
      interval: 5s
      retries: 5
    dns:
      - 192.168.243.1
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      a-grfics-admin:
        priority: 10
      b-level0-net:
        ipv4_address: 192.168.243.5
        priority: 100

    # Optional if you want to override default CMD
    # command: sh -c "./simulation/simulation & cd modbus && ./run_all.sh"

  plc:
    # image: fortiphyd/grfics-plc
    image: ghcr.io/fortilab-argentina/grfics-plc:latest
    container_name: plc
    hostname: plc
    # build:
    #   context: ./plc
    #   args:
    #     BUILD_VERSION: ${BUILD_VERSION:-unknown}
    #     BUILD_CREATED: ${BUILD_CREATED:-unknown}
    cap_add:
      - NET_ADMIN
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    dns:
      - 192.168.243.17
    networks:
      a-grfics-admin:
        priority: 10
      c-level1-net:
        ipv4_address: 192.168.243.20
        priority: 100
    volumes:
      - plc_volume:/docker_persistent

    # Optional if you want to override default CMD
    # command: sh -c "./simulation/simulation & cd modbus && ./run_all.sh"


  ews:
    # image: fortiphyd/grfics-workstation
    image: ghcr.io/fortilab-argentina/grfics-workstation:latest
    container_name: EWS
    hostname: EWS
    # build:
    #   context: ./workstation
    #   args:
    #     BUILD_VERSION: ${BUILD_VERSION:-unknown}
    #     BUILD_CREATED: ${BUILD_CREATED:-unknown}
    cap_add:
      - NET_ADMIN
    ports:
      - "6080:6080"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:6080/"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    dns:
      - 192.168.243.49
    networks:
      a-grfics-admin:
        priority: 10
      e-level3-net:
        ipv4_address: 192.168.243.60
        priority: 100

    # Optional if you want to override default CMD
    # command: sh -c "./simulation/simulation & cd modbus && ./run_all.sh"

  hmi:
    # image: fortiphyd/grfics-scadalts
    image: ghcr.io/fortilab-argentina/grfics-scadalts:latest
    container_name: HMI
    # build:
    #   context: ./scadalts
    #   args:
    #     BUILD_VERSION: ${BUILD_VERSION:-unknown}
    #     BUILD_CREATED: ${BUILD_CREATED:-unknown}
    dns:
      - 192.168.243.33
    cap_add:
      - NET_ADMIN
    ports:
      - "6081:8080"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s
    networks:
      a-grfics-admin:
        priority: 10
      d-level2-net:
        ipv4_address: 192.168.243.36
        priority: 100
    volumes:
      - scadalts_db:/var/lib/mysql
    # Optional if you want to override default CMD
    # command: sh -c "./simulation/simulation & cd modbus && ./run_all.sh"

