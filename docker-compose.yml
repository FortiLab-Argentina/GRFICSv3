# NOTE networks had to be prepended with letters to ensure 
# proper alphabetical order 

services:
  simulation:
    image: fortiphyd/grfics-simulation
    container_name: simulation
    hostname: simulation
    build:
      context: ./simulation
      args:
        BUILD_VERSION: ${BUILD_VERSION:-unknown}
        BUILD_CREATED: ${BUILD_CREATED:-unknown}
    cap_add:
      - NET_ADMIN
    ports:
      - "80:80"
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "55555"]
      interval: 5s
      retries: 5
    dns:
      - 192.168.95.200
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      a-grfics-admin:
        priority: 10
      b-ics-net:
        ipv4_address: 192.168.95.45
        priority: 100

    # Optional if you want to override default CMD
    # command: sh -c "./simulation/simulation & cd modbus && ./run_all.sh"

  plc:
    image: fortiphyd/grfics-plc
    container_name: plc
    hostname: plc
    build:
      context: ./plc
      args:
        BUILD_VERSION: ${BUILD_VERSION:-unknown}
        BUILD_CREATED: ${BUILD_CREATED:-unknown}
    cap_add:
      - NET_ADMIN
    ports:
      - "8080:8080"
    dns:
      - 192.168.95.200
    networks:
      a-grfics-admin:
        priority: 10
      b-ics-net:
        ipv4_address: 192.168.95.2
        priority: 100
    volumes:
      - plc_volume:/docker_persistent

    # Optional if you want to override default CMD
    # command: sh -c "./simulation/simulation & cd modbus && ./run_all.sh"


  ews:
    image: fortiphyd/grfics-workstation
    container_name: EWS
    hostname: EWS
    build:
      context: ./workstation
      args:
        BUILD_VERSION: ${BUILD_VERSION:-unknown}
        BUILD_CREATED: ${BUILD_CREATED:-unknown}
    cap_add:
      - NET_ADMIN
    ports:
      - "6080:6080"
    dns:
      - 192.168.95.200
    networks:
      a-grfics-admin:
        priority: 10
      b-ics-net:
        ipv4_address: 192.168.95.5
        priority: 100

    # Optional if you want to override default CMD
    # command: sh -c "./simulation/simulation & cd modbus && ./run_all.sh"

  hmi:
    image: fortiphyd/grfics-scadalts
    container_name: HMI
    build:
      context: ./scadalts
      args:
        BUILD_VERSION: ${BUILD_VERSION:-unknown}
        BUILD_CREATED: ${BUILD_CREATED:-unknown}
    dns:
      - 192.168.90.200
    cap_add:
      - NET_ADMIN
    ports:
      - "6081:8080"
    networks:
      a-grfics-admin:
        priority: 10
      c-dmz-net:
        ipv4_address: 192.168.90.107
        priority: 100
    volumes:
      - scadalts_db:/var/lib/mysql
    # Optional if you want to override default CMD
    # command: sh -c "./simulation/simulation & cd modbus && ./run_all.sh"

  kali:
    image: fortiphyd/grfics-attacker
    container_name: kali
    hostname: kali
    build:
      context: ./attacker
      args:
        BUILD_VERSION: ${BUILD_VERSION:-unknown}
        BUILD_CREATED: ${BUILD_CREATED:-unknown}
    cap_add:
      - NET_ADMIN
    ports:
      - "6088:6080"
    dns:
      - 192.168.90.200
    networks:
      a-grfics-admin:
        priority: 10
      c-dmz-net:
        ipv4_address: 192.168.90.6
        priority: 100
    sysctls:
      net.ipv4.conf.default.arp_announce: 2
      net.ipv4.conf.all.arp_announce: 2

  router:
    image: fortiphyd/grfics-router
    container_name: router
    hostname: router
    build:
      context: ./router
      args:
        BUILD_VERSION: ${BUILD_VERSION:-unknown}
        BUILD_CREATED: ${BUILD_CREATED:-unknown}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "bash", "-c", "ip route | grep -q 192.168.95.0 || exit 1"]
      interval: 5s
      retries: 5
    cap_add:
     - NET_ADMIN
     - NET_RAW
    sysctls:
      net.ipv4.ip_forward: '1'
    environment:
      - FWUI_SECRET_KEY=some-long-secret-you-generate
    ports:
     - "51820:51820/udp"
    volumes:
     - router_config:/etc/firewall
    networks:
      a-grfics-admin:
      b-ics-net:
        ipv4_address: 192.168.95.200
      c-dmz-net:
        ipv4_address: 192.168.90.200

  caldera:
    image: fortiphyd/grfics-caldera
    container_name: caldera
    hostname: caldera
    build:
      context: ./caldera
      args:
        BUILD_VERSION: ${BUILD_VERSION:-unknown}
        BUILD_CREATED: ${BUILD_CREATED:-unknown}
    restart: unless-stopped
    ports:
      - "8888:8888"
    dns:
      - 192.168.90.200
    networks:
      a-grfics-admin:
        priority: 10
      c-dmz-net:
        ipv4_address: 192.168.90.250
        priority: 100

  wazuh:
    profiles: [siem]
    image: fortiphyd/grfics-wazuh
    container_name: wazuh
    hostname: wazuh
    build:
      context: ./wazuh
      args:
        BUILD_VERSION: ${BUILD_VERSION:-unknown}
        BUILD_CREATED: ${BUILD_CREATED:-unknown}
    restart: unless-stopped
    ports:
      - "1514:1514"     # Wazuh agent enrollment
      - "1515:1515"     # Wazuh agent communication
      - "55000:55000"   # Wazuh REST API
      - "5601:5601"     # Dashboard HTTP
    cap_add:
      - NET_ADMIN
    volumes:
      - wazuh_manager_data:/var/ossec
      - wazuh_indexer_data:/var/lib/wazuh-indexer
    dns:
      - 192.168.90.200
    networks:
      a-grfics-admin:
        priority: 10
      c-dmz-net:
        ipv4_address: 192.168.90.20
        priority: 100

networks:
  b-ics-net:
    driver: macvlan
    driver_opts:
      parent: eth0  # Replace with your actual host NIC
    ipam:
      config:
        - subnet: 192.168.95.0/24
          gateway: 192.168.95.1

  c-dmz-net:
    driver: macvlan
    driver_opts:
      parent: eth0  # Replace with your actual host NIC
    ipam:
      config:
        - subnet: 192.168.90.0/24
          gateway: 192.168.90.1


  a-grfics-admin:
    driver: bridge

volumes:
  scadalts_db:
    name: scadalts_db
  plc_volume:
    name: plc_volume
  router_config:
    name: router_config
  wazuh_manager_data:
    name: wazuh_manager_data
  wazuh_indexer_data:
    name: wazuh_indexer_data
