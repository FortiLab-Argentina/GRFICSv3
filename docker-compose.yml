networks:
  b-level0-net:
    driver: macvlan
    driver_opts:
      parent: ens19  # Replace with your actual host NIC
    ipam:
      config:
        - subnet: 192.168.243.0/28
          gateway: 192.168.243.1

  c-level1-net:
    driver: macvlan
    driver_opts:
      parent: ens20  # Replace with your actual host NIC
    ipam:
      config:
        - subnet: 192.168.243.16/28
          gateway: 192.168.243.17

  d-level2-net:
      driver: macvlan
      driver_opts:
        parent: ens21  # Replace with your actual host NIC
      ipam:
        config:
          - subnet: 192.168.243.32/28
            gateway: 192.168.243.33

  e-level3-net:
      driver: macvlan
      driver_opts:
        parent: ens22  # Replace with your actual host NIC
      ipam:
        config:
          - subnet: 192.168.243.48/28
            gateway: 192.168.243.49

  a-grfics-admin:
    driver: bridge

volumes:
  scadalts_db:
    name: scadalts_db
  plc_volume:
    name: plc_volume
  router_config:
    name: router_config
  wazuh_manager_data:
    name: wazuh_manager_data
  wazuh_indexer_data:
    name: wazuh_indexer_data
